<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="auraOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#ffd700;stop-opacity:0.95" />
      <stop offset="55%" style="stop-color:#9d00ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d0221;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="auraCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ffd700;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0" />
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer aura circle -->
  <circle cx="100" cy="100" r="95" fill="url(#auraOuter)" filter="url(#glow)"/>
  <!-- Mid ring -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <!-- Inner glow -->
  <circle cx="100" cy="100" r="40" fill="url(#auraCore)" filter="url(#glow)"/>
  <!-- Lightning bolts -->
  <g stroke="#ffd700" stroke-width="2.5" fill="none" filter="url(#glow)" opacity="0.95">
    <polyline points="100,15 88,55 103,55 82,95"/>
    <polyline points="100,15 112,52 97,52 118,92"/>
    <polyline points="25,75 52,83 43,93 68,99"/>
    <polyline points="175,75 148,83 157,93 132,99"/>
    <polyline points="45,165 67,138 58,128 82,107"/>
    <polyline points="155,165 133,138 142,128 118,107"/>
  </g>
  <!-- Center star -->
  <polygon points="100,80 104,92 117,92 107,100 111,112 100,105 89,112 93,100 83,92 96,92" fill="#ffd700" filter="url(#glow)" opacity="0.95"/>
</svg>
